<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Schedule Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>

<body>

    <header>
        <h1>2026例常活动场地</h1>
        <p>2026年1月20日至8月18日</p>
    </header>

    <main>
        <div class="controls">
            <div id="auto-load-status">🔍 Initializing system...</div>
            <div class="search-container">
                <input type="text" id="venue-search" class="search-input" placeholder="Search for venue or activity...">
            </div>
            <div id="venue-tabs" class="venue-tabs"></div>
        </div>

        <div id="display-area" class="table-container">
            <div class="empty-state">
                <span class="empty-state-icon">📂</span>
                <p>Loading venue data, please wait...</p>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Venue Management System • All rights reserved
    </footer>

    <script src="script.js"></script>
</body>

</html>
